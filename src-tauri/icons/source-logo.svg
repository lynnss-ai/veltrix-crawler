<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- VeltrixLoop 桌面图标源图:品牌色 indigo→violet 渐变圆角块 + 白色 Radar 标识,与登录页/侧栏一致 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- 顶部微高光,增加立体质感,不影响小尺寸可读性 -->
    <linearGradient id="gloss" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#gloss)"/>
  <g transform="translate(242 242) scale(22.5)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/>
    <path d="M4 6h.01"/>
    <path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/>
    <path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/>
    <path d="M12 18h.01"/>
    <path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"/>
    <circle cx="12" cy="12" r="2"/>
    <path d="m13.41 10.59 5.66-5.66"/>
  </g>
</svg>
